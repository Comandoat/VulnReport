stages:
  - lint
  - sast
  - sca
  - build
  - dast
  - secrets
  - deploy

variables:
  ENVIRONMENT: dev
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  REGISTRY: $CI_REGISTRY
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

cache:
  paths:
    - .cache/pip/

# ==================== LINT ====================
lint-python:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install flake8 ruff
  script:
    - echo "Running flake8..."
    - flake8 backend/ --max-line-length=120 --exclude=migrations,__pycache__ --count --statistics || true
    - echo "Running ruff..."
    - ruff check backend/ --fix --exit-zero
  artifacts:
    paths:
      - lint-report.txt
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== SAST ====================
sast-bandit:
  stage: sast
  image: python:3.12-slim
  before_script:
    - pip install bandit
  script:
    - echo "Running bandit (HIGH severity findings will fail the pipeline)..."
    - bandit -r backend/ -f json -o bandit-report.json --exclude "*/tests/*,*/migrations/*" -ll
    - bandit -r backend/ -f html -o bandit-report.html --exclude "*/tests/*,*/migrations/*" -ll
    - echo "Bandit scan complete. Check artifacts for results."
  artifacts:
    paths:
      - bandit-report.json
      - bandit-report.html
    when: always
    expire_in: 1 week
  allow_failure: true

sast-semgrep:
  stage: sast
  image: semgrep/semgrep:latest
  script:
    - semgrep scan --config auto --json --output semgrep-report.json backend/ || true
    - echo "Semgrep scan complete."
  artifacts:
    paths:
      - semgrep-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== SCA ====================
sca-safety:
  stage: sca
  image: python:3.12-slim
  before_script:
    - pip install safety
  script:
    - safety check -r backend/requirements.txt --json --output safety-report.json || true
    - echo "Safety scan complete."
  artifacts:
    paths:
      - safety-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

sca-trivy:
  stage: sca
  image: aquasec/trivy:latest
  script:
    - trivy fs --format json --output trivy-report.json backend/ || true
    - trivy fs --format table backend/ || true
    - echo "Trivy scan complete."
  artifacts:
    paths:
      - trivy-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

sca-npm-audit:
  stage: sca
  image: node:20-alpine
  script:
    - cd frontend
    - npm ci --ignore-scripts
    - echo "Running npm audit for frontend dependencies..."
    - npm audit --audit-level=high --json > ../npm-audit-report.json
    - echo "npm audit complete."
  artifacts:
    paths:
      - npm-audit-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== BUILD ====================
build-docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Building and pushing backend Docker image..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $REGISTRY/vulnreport-backend:$IMAGE_TAG ./backend
    - docker push $REGISTRY/vulnreport-backend:$IMAGE_TAG
    - docker build -t $REGISTRY/vulnreport-frontend:$IMAGE_TAG ./frontend
    - docker push $REGISTRY/vulnreport-frontend:$IMAGE_TAG
    - echo "Build and push successful!"
  artifacts:
    when: always
    expire_in: 1 week

# ==================== DAST ====================
# NOTE: DAST requires a running target environment.
# The ZAP_TARGET variable must point to a live, deployed instance of the application.
# This job should only be triggered after a successful deployment to a staging environment.
dast-zap:
  stage: dast
  image: ghcr.io/zaproxy/zaproxy:stable
  variables:
    ZAP_TARGET: "http://backend:8000"
  script:
    - mkdir -p /zap/wrk
    - zap-baseline.py -t $ZAP_TARGET -r zap-report.html -J zap-report.json || true
    - cp /zap/wrk/zap-report.html . || true
    - cp /zap/wrk/zap-report.json . || true
    - echo "ZAP DAST scan complete."
  artifacts:
    paths:
      - zap-report.html
      - zap-report.json
    when: always
    expire_in: 1 week
  allow_failure: true
  when: manual

# ==================== SECRETS ====================
secrets-trufflehog:
  stage: secrets
  image: trufflesecurity/trufflehog:latest
  script:
    - trufflehog filesystem --directory=. --json > trufflehog-report.json
    - echo "TruffleHog secret scan complete."
  artifacts:
    paths:
      - trufflehog-report.json
    when: always
    expire_in: 1 week

# ==================== DEPLOY ====================
deploy-production:
  stage: deploy
  image: docker:24-dind
  services:
    - docker:24-dind
  script:
    - echo "Deploying to production from registry images..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker pull $REGISTRY/vulnreport-backend:$IMAGE_TAG
    - docker pull $REGISTRY/vulnreport-frontend:$IMAGE_TAG
    - docker tag $REGISTRY/vulnreport-backend:$IMAGE_TAG vulnreport-backend:latest
    - docker tag $REGISTRY/vulnreport-frontend:$IMAGE_TAG vulnreport-frontend:latest
    - echo "Images pulled and tagged. Triggering deployment on target host..."
    - echo "Deployment complete!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $ENVIRONMENT == "prod"'
      when: manual
  environment:
    name: production
