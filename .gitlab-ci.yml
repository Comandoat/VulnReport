stages:
  - lint
  - sast
  - sca
  - build
  - dast
  - secrets
  - deploy

variables:
  ENVIRONMENT: dev
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip/

# ==================== LINT ====================
lint-python:
  stage: lint
  image: python:3.12-slim
  before_script:
    - pip install flake8 ruff
  script:
    - echo "Running flake8..."
    - flake8 backend/ --max-line-length=120 --exclude=migrations,__pycache__ --count --statistics || true
    - echo "Running ruff..."
    - ruff check backend/ --fix --exit-zero
  allow_failure: true

# ==================== SAST ====================
sast-bandit:
  stage: sast
  image: python:3.12-slim
  before_script:
    - pip install bandit
  script:
    - echo "Running Bandit SAST analysis..."
    - bandit -r backend/ -f json -o bandit-report.json --exclude "*/tests/*,*/migrations/*" -ll || true
    - bandit -r backend/ -f html -o bandit-report.html --exclude "*/tests/*,*/migrations/*" -ll || true
    - echo "Bandit scan complete."
  artifacts:
    paths:
      - bandit-report.json
      - bandit-report.html
    when: always
    expire_in: 1 week
  allow_failure: true

sast-semgrep:
  stage: sast
  image: semgrep/semgrep:latest
  script:
    - semgrep scan --config auto --json --output semgrep-report.json backend/ || true
    - echo "Semgrep scan complete."
  artifacts:
    paths:
      - semgrep-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== SCA ====================
sca-safety:
  stage: sca
  image: python:3.12-slim
  before_script:
    - pip install safety
  script:
    - safety check -r backend/requirements.txt --json --output safety-report.json || true
    - echo "Safety scan complete."
  artifacts:
    paths:
      - safety-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

sca-trivy:
  stage: sca
  image: aquasec/trivy:latest
  script:
    - trivy fs --format json --output trivy-report.json backend/ || true
    - trivy fs --format table backend/ || true
    - echo "Trivy scan complete."
  artifacts:
    paths:
      - trivy-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

sca-npm-audit:
  stage: sca
  image: node:20-alpine
  script:
    - cd frontend
    - npm install --ignore-scripts 2>/dev/null || true
    - echo "Running npm audit..."
    - npm audit --audit-level=high --json > ../npm-audit-report.json || true
    - echo "npm audit complete."
  artifacts:
    paths:
      - npm-audit-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== BUILD ====================
build-docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - echo "Building backend Docker image..."
    - docker build -t vulnreport-backend:$CI_COMMIT_SHORT_SHA ./backend
    - echo "Building frontend Docker image..."
    - docker build -t vulnreport-frontend:$CI_COMMIT_SHORT_SHA ./frontend
    - echo "Build successful!"
    - echo "ENVIRONMENT=$ENVIRONMENT"
  allow_failure: true

# ==================== DAST ====================
# NOTE: DAST requires a running target environment.
# Configure ZAP_TARGET to point to a live staging instance.
# This job is manual — trigger it after deploying to staging.
dast-zap:
  stage: dast
  image: ghcr.io/zaproxy/zaproxy:stable
  variables:
    ZAP_TARGET: "http://backend:8000"
  script:
    - mkdir -p /zap/wrk
    - zap-baseline.py -t $ZAP_TARGET -r zap-report.html -J zap-report.json || true
    - cp /zap/wrk/zap-report.html . || true
    - cp /zap/wrk/zap-report.json . || true
    - echo "ZAP DAST scan complete."
  artifacts:
    paths:
      - zap-report.html
      - zap-report.json
    when: always
    expire_in: 1 week
  allow_failure: true
  when: manual

# ==================== SECRETS ====================
secrets-trufflehog:
  stage: secrets
  image: trufflesecurity/trufflehog:latest
  script:
    - echo "Running TruffleHog secret scan (excluding ateliers test files)..."
    - trufflehog filesystem --directory=. --exclude-paths=ateliers/ --json > trufflehog-report.json || true
    - echo "TruffleHog scan complete."
  artifacts:
    paths:
      - trufflehog-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== DEPLOY ====================
deploy-production:
  stage: deploy
  image: alpine:latest
  script:
    - echo "=== DEPLOYMENT ==="
    - echo "Branch $CI_COMMIT_BRANCH"
    - echo "Environment $ENVIRONMENT"
    - echo "To deploy use docker compose up --build on the target server"
    - echo "Deployment placeholder complete"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $ENVIRONMENT == "prod"
      when: manual
    - when: never
  environment:
    name: production
