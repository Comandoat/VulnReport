stages:
  - lint
  - sast
  - sca
  - build
  - secrets
  - deploy

variables:
  ENVIRONMENT: dev

# ==================== LINT ====================
lint-python:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install --quiet flake8 ruff
    - flake8 backend/ --max-line-length=120 --exclude=migrations,__pycache__ --count --statistics || true
    - ruff check backend/ --exit-zero
  allow_failure: true

# ==================== SAST ====================
sast-bandit:
  stage: sast
  image: python:3.12-slim
  script:
    - pip install --quiet bandit
    - bandit -r backend/ -f json -o bandit-report.json --exclude "*/tests/*,*/migrations/*" -ll || true
    - bandit -r backend/ -f html -o bandit-report.html --exclude "*/tests/*,*/migrations/*" -ll || true
  artifacts:
    paths:
      - bandit-report.json
      - bandit-report.html
    when: always
    expire_in: 1 week
  allow_failure: true

sast-semgrep:
  stage: sast
  image: semgrep/semgrep:latest
  script:
    - semgrep scan --config auto --json --output semgrep-report.json backend/ || true
  artifacts:
    paths:
      - semgrep-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== SCA ====================
sca-safety:
  stage: sca
  image: python:3.12-slim
  script:
    - pip install --quiet safety
    - safety check -r backend/requirements.txt --json --output safety-report.json || true
  artifacts:
    paths:
      - safety-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

sca-trivy:
  stage: sca
  image: aquasec/trivy:latest
  script:
    - trivy fs --format json --output trivy-report.json backend/ || true
  artifacts:
    paths:
      - trivy-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

sca-npm-audit:
  stage: sca
  image: node:20-alpine
  script:
    - cd frontend && npm install --ignore-scripts 2>/dev/null || true
    - cd frontend && npm audit --audit-level=high --json > ../npm-audit-report.json || true
  artifacts:
    paths:
      - npm-audit-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== BUILD ====================
build-backend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t vulnreport-backend:latest ./backend
    - echo "Backend image built successfully"
  allow_failure: true

# ==================== SECRETS ====================
secrets-trufflehog:
  stage: secrets
  image: python:3.12-slim
  script:
    - pip install --quiet trufflehog3 || pip install --quiet truffleHog || true
    - echo "Secret scanning with grep-based approach..."
    - grep -rn "password\|secret\|api_key\|token\|AWS_" backend/ --include="*.py" | grep -v "test\|migration\|__pycache__" | grep -vi "get_password\|set_password\|PASSWORD_HASHERS\|validate_password\|old_password\|new_password\|change.password\|password_hash\|PasswordValidator\|CSRF\|csrf\|SESSION_COOKIE\|SECURE_" > secrets-scan.txt || true
    - cat secrets-scan.txt
    - echo "Secret scan complete"
  artifacts:
    paths:
      - secrets-scan.txt
    when: always
    expire_in: 1 week
  allow_failure: true

# ==================== DEPLOY ====================
deploy-production:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deployment placeholder - use docker compose on target server"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $ENVIRONMENT == "prod"
      when: manual
    - when: never
  environment:
    name: production
