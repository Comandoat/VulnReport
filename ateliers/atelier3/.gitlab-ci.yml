stages:
  - build
  - sast
  - sca
  - dast
  - secrets

variables:
  JUICE_SHOP_IMAGE: bkimminich/juice-shop

# ============================================
# Stage: SAST - Analyse statique avec Bandit
# ============================================

sast-bandit:
  stage: sast
  image: python:3.12-slim
  before_script:
    - pip install bandit
  script:
    - bandit -r . -f json -o bandit-report.json --exclude "*/tests/*,*/migrations/*,*/node_modules/*" -ll
    - bandit -r . -f html -o bandit-report.html --exclude "*/tests/*,*/migrations/*,*/node_modules/*" -ll
  artifacts:
    paths:
      - bandit-report.json
      - bandit-report.html
    when: always
    expire_in: 1 week

# ============================================
# Stage: Build - Preparation Juice Shop
# ============================================

build-juice-shop:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker pull $JUICE_SHOP_IMAGE
    - echo "Juice Shop image pulled successfully"

# ============================================
# Stage: SCA - Analyse des dependances
# ============================================

sca-safety:
  stage: sca
  image: python:3.12-slim
  before_script:
    - pip install safety
  script:
    - safety check --output json > safety-report.json || true
    - safety check || true
  artifacts:
    paths:
      - safety-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

sca-trivy:
  stage: sca
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy fs --format json --output trivy-report.json . || true
    - trivy fs --severity HIGH,CRITICAL . || true
  artifacts:
    paths:
      - trivy-report.json
    when: always
    expire_in: 1 week
  allow_failure: true

# ============================================
# Stage: DAST - Scan dynamique avec OWASP ZAP
# ============================================

dast-zap-juice-shop:
  stage: dast
  image: ghcr.io/zaproxy/zaproxy:stable
  services:
    - name: bkimminich/juice-shop
      alias: juice-shop
  variables:
    ZAP_TARGET: "http://juice-shop:3000"
  script:
    - mkdir -p /zap/wrk
    - sleep 30  # Attendre le demarrage de Juice Shop
    - zap-baseline.py -t $ZAP_TARGET -r zap-report.html -J zap-report.json -I
    - cp /zap/wrk/zap-report.html . 2>/dev/null || true
    - cp /zap/wrk/zap-report.json . 2>/dev/null || true
  artifacts:
    paths:
      - zap-report.html
      - zap-report.json
    when: always
    expire_in: 1 week
  allow_failure: true
  when: manual

# ============================================
# Stage: Secrets - Detection avec TruffleHog
# ============================================

secrets-trufflehog:
  stage: secrets
  image: trufflesecurity/trufflehog:latest
  script:
    - trufflehog filesystem --directory=. --json > trufflehog-report.json
  artifacts:
    paths:
      - trufflehog-report.json
    when: always
    expire_in: 1 week
